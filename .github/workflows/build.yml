name: SonarCloud Analysis
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # مهم جداً لجلب تاريخ الكود
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # موجود تلقائياً في GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # هذا الذي أضفتيه أنتِ في الـ Secrets
